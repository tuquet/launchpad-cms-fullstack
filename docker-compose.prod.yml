# =============================================================================
# Production Docker Compose - Chạy trên VPS
# Chỉ PULL images từ Registry, KHÔNG build tại VPS
#
# Cách dùng:
#   1. Copy file này + .env + nginx/ lên VPS
#   2. docker login <REGISTRY_IP>:5000
#   3. docker compose -f docker-compose.prod.yml up -d
#
# Cập nhật version mới:
#   1. Sửa tag image (vd: latest -> v2)
#   2. docker compose -f docker-compose.prod.yml pull
#   3. docker compose -f docker-compose.prod.yml up -d
# =============================================================================

services:
  # ============================================
  # Strapi CMS - Backend API
  # Pull từ Private Registry (KHÔNG build)
  # ============================================
  strapi:
    image: ${REGISTRY_URL:-localhost:5000}/strapi-app:${IMAGE_TAG:-latest}
    container_name: strapi
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_CLIENT: ${DATABASE_CLIENT}
      DATABASE_HOST: launchpad-db
      DATABASE_PORT: ${DATABASE_PORT}
      DATABASE_NAME: ${DATABASE_NAME}
      DATABASE_USERNAME: ${DATABASE_USERNAME}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET}
      APP_KEYS: ${APP_KEYS}
      NODE_ENV: production
    ports:
      - "1337:1337"
    depends_on:
      launchpad-db:
        condition: service_healthy

  # ============================================
  # PostgreSQL Database
  # ============================================
  launchpad-db:
    container_name: launchpad-db
    image: postgres:16-alpine
    platform: linux/amd64
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    ports:
      - "5432:5432"
    volumes:
      - strapi-data:/var/lib/postgresql/data
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME} -d ${DATABASE_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Next.js Frontend
  # Pull từ Private Registry (KHÔNG build)
  # ============================================
  nextjs:
    image: ${REGISTRY_URL:-localhost:5000}/next-app:${IMAGE_TAG:-latest}
    container_name: nextjs
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://strapi:1337
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      - strapi

  # ============================================
  # Nginx Reverse Proxy
  # ============================================
  nginx:
    container_name: nginx
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - nextjs
      - strapi

volumes:
  strapi-data:
